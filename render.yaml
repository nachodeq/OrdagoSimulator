services:
  - type: web
    name: ordago-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TABLE_PATH
        value: data/partner_known_exact_master.parquet
      - key: FRONTEND_ORIGIN
        value: "*"
